<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Interferência 3D</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

<!-- Three.js global (sem módulo!) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, -40, 30);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🔥 CONTROLES
const controls = new THREE.OrbitControls(camera, renderer.domElement);

// Luz
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,10,20);
scene.add(light);

// Parâmetros
const k = 1;
const d = 5;

// Malha (reduzi pra garantir que aparece)
const size = 60;
const segments = 120;

const geometry = new THREE.PlaneGeometry(size, size, segments, segments);

// Função de interferência
function wave(x, y) {
  const r1 = Math.sqrt((x + d/2)*(x + d/2) + y*y);
  const r2 = Math.sqrt((x - d/2)*(x - d/2) + y*y);
  return Math.sin(k*r1) + Math.sin(k*r2);
}

// Aplicar deformação
const pos = geometry.attributes.position;

for (let i = 0; i < pos.count; i++) {
  const x = pos.getX(i);
  const y = pos.getY(i);
  const z = wave(x, y);
  pos.setZ(i, z);
}

geometry.computeVertexNormals();

// Material (bem visível)
const material = new THREE.MeshStandardMaterial({
  color: 0x1565C0,
  metalness: 0.2,
  roughness: 0.7,
  side: THREE.DoubleSide
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

// 👉 inclinar o plano (senão você olha “de lado” e parece vazio)
mesh.rotation.x = Math.PI / 3;

// Loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
